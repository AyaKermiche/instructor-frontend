<div class="planning-page container-fluid py-4 px-3 min-vh-100">
  
  <!-- HEADER -->
  <div class="d-flex align-items-center mb-4">
    <a [routerLink]="['/home']" class="back-btn me-3">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="fw-bold mb-0">Planning</h4>
  </div>

  <!-- DAYS -->
  <div class="planning-list">

    <div *ngFor="let day of days" class="day-card">

      <!-- DAY HEADER -->
      <div 
        class="day-top"
        data-bs-toggle="collapse"
        [attr.data-bs-target]="'#' + day.id"
      >
        <div>
          <div class="day-title">{{ day.label }}</div>
          <div class="day-count">
            {{ (groupedSchedules[day.dayIndex] || []).length }} séances
          </div>
        </div>

        <i class="bi bi-chevron-down"></i>
      </div>

      <!-- CONTENT -->
      <div [id]="day.id" class="collapse">

        <div class="day-content">

          <!-- EMPTY -->
          <div 
            *ngIf="!groupedSchedules[day.dayIndex] || groupedSchedules[day.dayIndex].length === 0"
            class="empty-state"
          >
            Aucune séance prévue
          </div>

          <!-- SESSIONS -->
          <div *ngFor="let session of groupedSchedules[day.dayIndex]">

            <div class="session-card">

              <div class="session-left">
                <div class="session-time">
                  {{ session.startTime | date:'HH:mm' }} — {{ session.endTime | date:'HH:mm' }}
                </div>

          
              </div>

              <div 
                class="session-status"
                [class.free]="session.isAvailable"
                [class.busy]="!session.isAvailable"
              >
                {{ session.isAvailable ? 'Libre' : 'Occupé' }}
              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>
</div>
