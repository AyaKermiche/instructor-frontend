<div class="container-fluid py-4 px-3 bg-light min-vh-100">
  
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center">
      <a [routerLink]="['/home']" class="text-dark me-3 text-decoration-none p-1">
        <i class="bi bi-arrow-left fs-3"></i>
      </a>
      <h4 class="fw-bold mb-0">Notifications</h4>
    </div>
  </div>

  <div class="d-grid gap-3">

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden border-start border-primary border-5">
      <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-start mb-1">
          <span class="badge bg-primary-soft text-primary rounded-pill small">Examen</span>
          <small class="text-muted">Il y a 10 min</small>
        </div>
        <h6 class="fw-bold mb-1">Nouvel examen programmé</h6>
        <p class="small text-secondary mb-0">Un examen de conduite a été ajouté pour <strong>Ines Benali</strong> le 30 Mars.</p>
      </div>
    </div>

  </div>
</div>
