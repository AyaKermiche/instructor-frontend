<div class="container-fluid py-4 px-3 bg-light min-vh-100">
  
  <h5 class="fw-bold mb-3 text-secondary text-uppercase" style="letter-spacing: 1px;">
    Cours du jour
  </h5>

  <div class="d-grid gap-3 mb-5">
    
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="card-body p-0">
        <div class="d-flex justify-content-between align-items-center p-3 border-start border-primary border-4" 
             role="button" 
             data-bs-toggle="collapse" 
             data-bs-target="#details1">
          <div>
            <span class="badge rounded-pill bg-primary-soft text-primary mb-1">Conduite</span>
            <h6 class="mb-0 fw-bold fs-5 text-dark">11:00 — 12:00</h6>
          </div>
          <i class="bi bi-chevron-down text-muted"></i>
        </div>

        <div class="collapse show" id="details1">
          <div class="px-3 pb-3 pt-0 bg-white">
            <hr class="mt-0 mb-3 opacity-10">
            <div class="mb-2">
              <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 0.7rem;">Candidat</small>
              <span class="fw-bold text-dark fs-6">Ines Benali</span>
            </div>

            <div class="d-flex align-items-center justify-content-between">
              <div>
                <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 0.7rem;">Présence</small>
                <span class="badge bg-success-subtle text-success border border-success-subtle py-1 px-2">
                  <i class="bi bi-check-circle-fill me-1"></i> Présent
                </span>
              </div>
              
              <i class="bi bi-pencil-square text-primary fs-5 p-2" 
                 role="button" 
                 data-bs-toggle="modal" 
                 data-bs-target="#presenceModal"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="card-body p-0">
        <div class="d-flex justify-content-between align-items-center p-3 border-start border-success border-4" 
             role="button" 
             data-bs-toggle="collapse" 
             data-bs-target="#details2">
          <div>
            <span class="badge rounded-pill bg-success-soft text-success mb-1">Code</span>
            <h6 class="mb-0 fw-bold fs-5 text-dark">14:30 — 15:30</h6>
          </div>
          <i class="bi bi-chevron-down text-muted"></i>
        </div>

        <div class="collapse show" id="details2">
          <div class="px-3 pb-3 pt-0 bg-white">
            <hr class="mt-0 mb-3 opacity-10">
            <div class="mb-2">
              <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 0.7rem;">Candidat</small>
              <span class="fw-bold text-dark fs-6">Anes Mahdi</span>
            </div>

            <div class="d-flex align-items-center justify-content-between">
              <div>
                <small class="text-muted d-block text-uppercase fw-bold" style="font-size: 0.7rem;">Présence</small>
                <span class="badge bg-success-subtle text-success border border-success-subtle py-1 px-2">
                  <i class="bi bi-check-circle-fill me-1"></i> Présent
                </span>
              </div>
              <i class="bi bi-pencil-square text-primary fs-5 p-2" 
                 role="button" 
                 data-bs-toggle="modal" 
                 data-bs-target="#presenceModal"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="row g-3">
    <div class="col-4">
      <div class="card border-0 shadow-sm rounded-4 text-center py-3 h-100 bg-white" [routerLink]="['/suivi-candidats']" role="button">
        <div class="bg-primary bg-opacity-10 text-primary rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
          <i class="bi bi-person-check fs-4"></i>
        </div>
        <span class="small fw-bold lh-sm px-1">Suivi</span>
      </div>
    </div>
    <div class="col-4">
      <div class="card border-0 shadow-sm rounded-4 text-center py-3 h-100 bg-white" [routerLink]="['/liste-candidats']" role="button">
        <div class="bg-warning bg-opacity-10 text-warning rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
          <i class="bi bi-people fs-4"></i>
        </div>
        <span class="small fw-bold lh-sm px-1">Liste</span>
      </div>
    </div>
    <div class="col-4">
      <div class="card border-0 shadow-sm rounded-4 text-center py-3 h-100 bg-white" [routerLink]="['/planning']" role="button">
        <div class="bg-info bg-opacity-10 text-info rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
          <i class="bi bi-calendar-event fs-4"></i>
        </div>
        <span class="small fw-bold lh-sm px-1">Planning</span>
      </div>
    </div>
  </div>

  <div class="modal fade" id="presenceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content border-0 shadow rounded-4">
        <div class="modal-header border-0 pb-0">
          <h6 class="modal-title fw-bold mx-auto text-dark">Statut du candidat</h6>
        </div>
        <div class="modal-body p-4 pt-2 text-center">
          <p class="small text-muted mb-4">Marquer la présence pour ce cours.</p>
          <div class="d-grid gap-2">
            <button class="btn btn-success rounded-pill py-2 fw-bold" data-bs-dismiss="modal">
              <i class="bi bi-check2 me-2"></i> Présent
            </button>
            <button class="btn btn-danger rounded-pill py-2 fw-bold" data-bs-dismiss="modal">
              <i class="bi bi-x-lg me-2"></i> Absent
            </button>
            <button class="btn btn-light rounded-pill py-2 mt-2" data-bs-dismiss="modal">Annuler</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
