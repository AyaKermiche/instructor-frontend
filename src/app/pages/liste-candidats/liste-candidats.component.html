<div class="container-fluid py-4 px-3 bg-light min-vh-100">
  
  <div class="d-flex align-items-center mb-4">
    <a [routerLink]="['/home']" class="text-dark me-3 text-decoration-none">
      <i class="bi bi-arrow-left fs-3"></i>
    </a>
    <h4 class="fw-bold mb-0">Liste des candidats</h4>
  </div>

  <div class="mb-4">
    <div class="input-group border-0 shadow-sm rounded-3 bg-white p-1">
      <span class="input-group-text bg-white border-0"><i class="bi bi-search text-muted"></i></span>
      <input type="text" class="form-control border-0 shadow-none" placeholder="Rechercher un nom...">
    </div>
  </div>

  <div class="d-grid gap-3">
    
    <div class="border-0 rounded-4 shadow-sm overflow-hidden bg-white">
      <div class="d-flex justify-content-between align-items-center p-3 border-start border-primary border-5" 
           role="button" data-bs-toggle="collapse" data-bs-target="#c1">
        <div>
          <span class="fw-bold d-block fs-5 text-dark">Ines Benali</span>
          <small class="text-primary text-uppercase fw-bold" style="font-size: 0.7rem;">
            <i class="bi bi-car-front-fill me-1"></i> Conduite
          </small>
        </div>
        <i class="bi bi-chevron-down text-muted"></i>
      </div>

      <div class="collapse" id="c1">
        <div class="p-3 pt-0">
          <hr class="mt-0 mb-3 opacity-10">
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-telephone text-muted me-3"></i>
            <span class="small fw-medium">0556 41 23 45</span>
          </div>
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-envelope text-muted me-3"></i>
            <span class="small fw-medium">ines.b&#64;gmail.com</span>
          </div>
          <div class="d-flex align-items-center">
            <i class="bi bi-card-checklist text-muted me-3"></i>
            <span class="badge bg-primary-soft text-primary rounded-pill">Permis B</span>
          </div>
        </div>
      </div>
    </div>

    <div class="border-0 rounded-4 shadow-sm overflow-hidden bg-white">
      <div class="d-flex justify-content-between align-items-center p-3 border-start border-success border-5" 
           role="button" data-bs-toggle="collapse" data-bs-target="#c2">
        <div>
          <span class="fw-bold d-block fs-5 text-dark">Anes Mahdi</span>
          <small class="text-success text-uppercase fw-bold" style="font-size: 0.7rem;">
            <i class="bi bi-book-fill me-1"></i> Code
          </small>
        </div>
        <i class="bi bi-chevron-down text-muted"></i>
      </div>

      <div class="collapse" id="c2">
        <div class="p-3 pt-0">
          <hr class="mt-0 mb-3 opacity-10">
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-telephone text-muted me-3"></i>
            <span class="small fw-medium">0661 22 33 44</span>
          </div>
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-envelope text-muted me-3"></i>
            <span class="small fw-medium">anes.m&#64;outlook.com</span>
          </div>
          <div class="d-flex align-items-center">
            <i class="bi bi-card-checklist text-muted me-3"></i>
            <span class="badge bg-success-soft text-success rounded-pill">Permis A</span>
          </div>
        </div>
      </div>
    </div>

    <div class="border-0 rounded-4 shadow-sm overflow-hidden bg-white">
      <div class="d-flex justify-content-between align-items-center p-3 border-start border-warning border-5" 
           role="button" data-bs-toggle="collapse" data-bs-target="#c3">
        <div>
          <span class="fw-bold d-block fs-5 text-dark">Alex Doe</span>
          <small class="text-warning text-uppercase fw-bold" style="font-size: 0.7rem;">
            <i class="bi bi-cone-striped me-1"></i> Créneau
          </small>
        </div>
        <i class="bi bi-chevron-down text-muted"></i>
      </div>

      <div class="collapse" id="c3">
        <div class="p-3 pt-0">
          <hr class="mt-0 mb-3 opacity-10">
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-telephone text-muted me-3"></i>
            <span class="small fw-medium">0770 55 66 77</span>
          </div>
          <div class="d-flex align-items-center mb-2">
            <i class="bi bi-envelope text-muted me-3"></i>
            <span class="small fw-medium">alex.doe&#64;mail.com</span>
          </div>
          <div class="d-flex align-items-center">
            <i class="bi bi-card-checklist text-muted me-3"></i>
            <span class="badge bg-warning-soft text-warning rounded-pill">Permis C</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
