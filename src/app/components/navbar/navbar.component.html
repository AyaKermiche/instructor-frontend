<nav class="navbar navbar-light bg-white border-bottom py-2 px-3 sticky-top">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    
    <span class="navbar-brand mb-0 h1 fw-bold text-dark" [routerLink]="['/home']" role="button">
      {{ instructorName }}
    </span>

    <div class="d-flex align-items-center gap-3">
      
      <a [routerLink]="['/notifications']" class="btn btn-link text-dark p-0 position-relative shadow-none">
        <i class="bi bi-bell fs-4"></i>
        <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
      </a>

      <div class="dropdown">
        <button 
          class="btn btn-link text-dark p-0 dropdown-toggle no-caret shadow-none" 
          type="button" 
          id="profileDropdown" 
          data-bs-toggle="dropdown" 
          aria-expanded="false">
          <i class="bi bi-person-circle fs-4"></i>
        </button>
        
        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 p-2 rounded-3" aria-labelledby="profileDropdown">
          <li>
            <a class="dropdown-item d-flex align-items-center py-2 rounded-2" [routerLink]="['/profile']">
              <i class="bi bi-person me-2"></i> Profile
            </a>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item d-flex align-items-center py-2 rounded-2 text-danger" 
               href="javascript:void(0)" 
               (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i> Logout
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>
</nav>
